[www]

; Run PHP-FPM as the www-data user/group
user = www-data
group = www-data

; Listen on TCP port 9000 (instead of Unix socket)
listen = 0.0.0.0:9000

; Allow connections from any container in the same network
listen.allowed_clients = 0.0.0.0

; Process management settings
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 5

; Logging
access.log = /proc/self/fd/2
clear_env = no
